<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LHANZ Software</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.forgot-page {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .forgot-header h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .forgot-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .forgot-form {
            display: grid;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: bold;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
        }

        .btn-send {
            padding: 1rem;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-send:hover {
            background: #5C1A1A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
        }

        .btn-send:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .reset-link {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 6px;
            border-left: 4px solid #8B0000;
            margin-top: 1rem;
            word-break: break-all;
        }

        .reset-link label {
            font-weight: bold;
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .reset-link p {
            font-family: monospace;
            font-size: 0.85rem;
            color: #666;
            margin: 0;
            line-height: 1.4;
        }

        .copy-btn {
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .copy-btn:hover {
            background: #5C1A1A;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #8B0000;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .info-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #004085;
        }
    </style>
</head>
<body class="forgot-page">
    <div class="forgot-container">
        <div class="forgot-header">
            <h2>🔑 Forgot Password</h2>
            <p>Enter your email to receive a password reset link</p>
        </div>

        <div class="info-box">
            💡 Enter your registered email address and we'll send you a link to reset your password.
        </div>

        <div id="message" class="message" style="display: none;"></div>

        <form onsubmit="handleForgotPassword(event)" class="forgot-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <button type="submit" class="btn-send" id="submitBtn">📧 Send Reset Link</button>
        </form>

        <div id="resetLinkBox" class="reset-link" style="display: none;">
            <label>✓ Password Reset Link Generated:</label>
            <p id="resetLink"></p>
            <button type="button" class="copy-btn" onclick="copyResetLink()">📋 Copy Link</button>
        </div>

        <div class="back-link">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function handleForgotPassword(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            const resetLinkBox = document.getElementById('resetLinkBox');

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Sending...';

                const response = await fetch('http://localhost:3000/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.textContent = '✓ ' + data.message;
                    messageEl.className = 'message success';
                    messageEl.style.display = 'block';

                    // Show reset link if available
                    if (data.resetLink) {
                        document.getElementById('resetLink').textContent = data.resetLink;
                        resetLinkBox.style.display = 'block';
                    }

                    document.getElementById('email').value = '';
                } else {
                    throw new Error(data.error || 'Request failed');
                }
            } catch (error) {
                console.error('Error:', error);
                messageEl.textContent = '✗ ' + error.message;
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📧 Send Reset Link';
            }
        }

        function copyResetLink() {
            const link = document.getElementById('resetLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                alert('✓ Link copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy link');
            });
        }
    </script>
</body>
</html>
