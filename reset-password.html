<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LHANZ Software</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.reset-page {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-header h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .reset-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .reset-form {
            display: grid;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: bold;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
        }

        .password-requirements {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #666;
        }

        .password-requirements ul {
            margin: 0;
            padding-left: 1rem;
        }

        .password-requirements li {
            margin: 0.3rem 0;
        }

        .btn-reset {
            padding: 1rem;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: #5C1A1A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
        }

        .btn-reset:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .invalid-link {
            text-align: center;
            padding: 2rem;
        }

        .invalid-link h2 {
            color: #721c24;
            margin-bottom: 1rem;
        }

        .invalid-link p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: #8B0000;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="reset-page">
    <div class="reset-container">
        <!-- Invalid Link Message -->
        <div id="invalidLink" class="invalid-link" style="display: none;">
            <h2>❌ Invalid Reset Link</h2>
            <p>The password reset link is invalid or has expired.</p>
            <p><a href="login.html" class="back-link">← Back to Login</a></p>
        </div>

        <!-- Reset Form -->
        <div id="resetForm" style="display: none;">
            <div class="reset-header">
                <h2>🔐 Reset Password</h2>
                <p>Enter your new password below</p>
            </div>

            <div id="message" class="message" style="display: none;"></div>

            <form onsubmit="handlePasswordReset(event)" class="reset-form">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="8">
                    <small style="color: #999;">Must be at least 8 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required minlength="8">
                </div>

                <div class="password-requirements">
                    <strong>Password Requirements:</strong>
                    <ul>
                        <li>✓ At least 8 characters</li>
                        <li>✓ One uppercase letter (A-Z)</li>
                        <li>✓ One number (0-9)</li>
                    </ul>
                </div>

                <button type="submit" class="btn-reset" id="submitBtn">Reset Password</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const userId = urlParams.get('userId');

        if (!token || !userId) {
            document.getElementById('invalidLink').style.display = 'block';
        } else {
            document.getElementById('resetForm').style.display = 'block';
        }

        async function handlePasswordReset(event) {
            event.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                messageEl.textContent = '✗ Passwords do not match';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
                return;
            }

            // Validate password requirements
            if (!/[A-Z]/.test(newPassword)) {
                messageEl.textContent = '✗ Password must contain at least one uppercase letter';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
                return;
            }

            if (!/[0-9]/.test(newPassword)) {
                messageEl.textContent = '✗ Password must contain at least one number';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Resetting...';

                const response = await fetch('http://localhost:3000/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token,
                        userId,
                        newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.textContent = '✓ ' + data.message;
                    messageEl.className = 'message success';
                    messageEl.style.display = 'block';

                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    throw new Error(data.error || 'Reset failed');
                }
            } catch (error) {
                console.error('Error:', error);
                messageEl.textContent = '✗ ' + error.message;
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        }
    </script>
</body>
</html>
